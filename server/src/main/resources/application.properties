spring.application.name=casual-connect
spring.sql.init.mode=always
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/casual_connect}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:casual_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:casual_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
